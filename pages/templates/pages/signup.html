{% extends 'pages/base.html' %}

{% block content %}
<section class="section" style="padding-top: 150px; padding-bottom: 100px;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 card p-4 shadow-sm border-0">
                <h2 class="text-center mb-4" style="color: #008374;">Create Account</h2>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    {{ form.as_p }}

                    <div class="text-center mt-4">
                        <button type="submit" class="btn" 
                                style="background-color: #008374; color: white; width: 100%; padding: 12px; border: none; border-radius: 4px; font-weight: 600;">
                            Sign Up
                        </button>
                    </div>
                </form>
                
                <p class="mt-4 text-center">
                    Already have an account? <a href="{% url 'login' %}" style="color: #008374; font-weight: 600;">Login here</a>
                </p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
